<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Intelligence Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --primary: #00f2ff;
            --accent: #7000ff;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding-bottom: 120px;
            overflow-x: hidden;
        }

        /* Animated Deep Space Background */
        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #111, #000);
        }
        .bg-mesh::after {
            content: "";
            position: absolute;
            width: 200%; height: 200%;
            top: -50%; left: -50%;
            background-image: radial-gradient(circle, #ffffff10 1px, transparent 1px);
            background-size: 50px 50px;
            animation: rotate 100s linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        header { text-align: center; padding: 60px 20px 20px; }
        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(1.5rem, 6vw, 3.5rem);
            letter-spacing: 8px;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        /* Filter Bar */
        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: #888;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }
        .filter-btn.active, .filter-btn:hover {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
        }

        /* BENTO GRID */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            grid-auto-rows: 280px;
            grid-auto-flow: dense;
            gap: 20px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            animation: fadeIn 0.5s ease forwards;
        }

        /* Bento Logic Spans */
        .card.large { grid-column: span 2; grid-row: span 2; }
        .card.wide { grid-column: span 2; }
        .card.tall { grid-row: span 2; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: 0.8s;
            filter: brightness(0.8);
        }
        .card:hover img { transform: scale(1.1); filter: brightness(1.1); }

        .card-info {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            padding: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            opacity: 0;
            transition: 0.4s;
        }
        .card:hover .card-info { opacity: 1; }

        .tag {
            background: var(--primary);
            color: black;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.6rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Delete Button */
        .btn-del {
            position: absolute;
            top: 15px; right: 15px;
            background: rgba(255, 77, 77, 0.2);
            color: #ff4d4d;
            border: 1px solid #ff4d4d44;
            width: 35px; height: 35px;
            border-radius: 50%;
            cursor: pointer;
            backdrop-filter: blur(5px);
            opacity: 0;
            transition: 0.3s;
        }
        .card:hover .btn-del { opacity: 1; }

        /* Upload Dock */
        .upload-dock {
            position: fixed;
            bottom: 30px; left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(25px);
            padding: 12px 25px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            display: flex; gap: 15px; align-items: center;
            z-index: 100;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .btn-main {
            background: white; color: black; border: none;
            padding: 10px 22px; border-radius: 25px;
            font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        .btn-main:hover { background: var(--primary); transform: translateY(-2px); }

        /* Lightbox */
        .lightbox {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.98);
            backdrop-filter: blur(20px);
            display: none; justify-content: center; align-items: center;
            z-index: 1000;
        }
        .lightbox img { max-width: 85%; max-height: 80vh; border-radius: 15px; box-shadow: 0 0 40px var(--primary); }

        @media (max-width: 800px) {
            .card.large, .card.wide, .card.tall { grid-column: span 1; grid-row: span 1; }
            .gallery-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <div class="bg-mesh"></div>

    <header>
        <h1>NEXUS.VAULT</h1>
        <div class="filter-bar" id="filter-bar">
            <button class="filter-btn active" onclick="filterData('all')">All</button>
            <button class="filter-btn" onclick="filterData('nature')">Nature</button>
            <button class="filter-btn" onclick="filterData('art')">Art</button>
            <button class="filter-btn" onclick="filterData('city')">City</button>
        </div>
    </header>

    <div class="gallery-grid" id="gallery"></div>

    <div class="upload-dock">
        <label for="file-upload" class="btn-main">+ UPLOAD</label>
        <input type="file" id="file-upload" style="display:none" accept="image/*">
    </div>

    <div class="lightbox" id="lightbox" onclick="this.style.display='none'">
        <img id="lb-img">
    </div>

    <script>
        const gallery = document.getElementById('gallery');
        const fileInput = document.getElementById('file-upload');
        let currentFilter = 'all';

        // 1. Initial State
        let db = JSON.parse(localStorage.getItem('nexus_pro_data')) || [
            { id: 1, src: "https://picsum.photos/id/10/800/800", cat: "nature", style: "large" },
            { id: 2, src: "https://picsum.photos/id/1016/800/400", cat: "city", style: "wide" },
            { id: 3, src: "https://picsum.photos/id/1011/400/800", cat: "nature", style: "tall" },
            { id: 4, src: "https://picsum.photos/id/1043/400/400", cat: "art", style: "" },
            { id: 5, src: "https://picsum.photos/id/1050/400/400", cat: "art", style: "" },
            { id: 6, src: "https://picsum.photos/id/1025/400/400", cat: "nature", style: "" },
            { id: 7, src: "https://picsum.photos/id/1033/800/800", cat: "city", style: "large" }
        ];

        function render() {
            gallery.innerHTML = '';
            const filtered = currentFilter === 'all' ? db : db.filter(i => i.cat === currentFilter);
            
            filtered.forEach((img) => {
                const card = document.createElement('div');
                card.className = `card ${img.style}`;
                card.innerHTML = `
                    <img src="${img.src}" onclick="openZoom('${img.src}')">
                    <button class="btn-del" onclick="deleteImg(${img.id})">✕</button>
                    <div class="card-info">
                        <span class="tag">${img.cat}</span>
                    </div>
                `;
                gallery.appendChild(card);
            });
            localStorage.setItem('nexus_pro_data', JSON.stringify(db));
        }

        // 2. Filtering Logic
        function filterData(category) {
            currentFilter = category;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.toLowerCase() === category);
            });
            render();
        }

        // 3. Advanced Upload with Category Selection
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const category = prompt("Enter category (nature, art, city):", "art") || "art";
                const reader = new FileReader();
                reader.onload = (event) => {
                    const newImg = {
                        id: Date.now(),
                        src: event.target.result,
                        cat: category.toLowerCase(),
                        style: Math.random() > 0.8 ? 'large' : (Math.random() > 0.7 ? 'wide' : '')
                    };
                    db.unshift(newImg);
                    render();
                };
                reader.readAsDataURL(file);
            }
        };

        function deleteImg(id) {
            if(confirm("Delete this masterpiece?")) {
                db = db.filter(item => item.id !== id);
                render();
            }
        }

        function openZoom(src) {
            const lb = document.getElementById('lightbox');
            document.getElementById('lb-img').src = src;
            lb.style.display = 'flex';
        }

        render();
    </script>
</body>
</html>
